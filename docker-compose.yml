name: afd

x-node-common: &node-common
  build:
    context: .
    args:
      VERSION: ${VERSION:-dev}
      COMMIT: ${COMMIT:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
  image: afd:${VERSION:-latest}
  restart: unless-stopped
  volumes:
    - nexus-data:/data
  environment: &node-env
    AFD_NODE_ID: ${NODE_ID:-node-1}
    AFD_NODE_NAME: ${NODE_NAME:-nexus-node}
    AFD_NODE_LOG_LEVEL: ${LOG_LEVEL:-info}
    AFD_NODE_DATA_DIR: /data
    AFD_API_HOST: 0.0.0.0
    AFD_API_PORT: "8080"
    AFD_API_AUTH_TOKEN: ${AUTH_TOKEN:-}
    AFD_API_RATE_LIMIT: "100"
    AFD_CLUSTER_GRPC_PORT: "50051"
    AFD_CLUSTER_DISCOVERY_PORT: "50052"
    AFD_CLUSTER_JOIN_PEERS: ${JOIN_PEERS:-}

services:
  node-1:
    <<: *node-common
    container_name: afd-1
    hostname: node-1
    ports:
      - "8080:8080"
      - "50051:50051"
      - "50052:50052/udp"
    environment:
      <<: *node-env
      AFD_NODE_ID: node-1
      AFD_CLUSTER_JOIN_PEERS: ${JOIN_PEERS:-}

  node-2:
    <<: *node-common
    container_name: afd-2
    hostname: node-2
    depends_on:
      - node-1
    ports:
      - "8081:8080"
      - "50061:50051"
      - "50062:50052/udp"
    environment:
      <<: *node-env
      AFD_NODE_ID: node-2
      AFD_API_PORT: "8080"
      AFD_CLUSTER_GRPC_PORT: "50051"
      AFD_CLUSTER_DISCOVERY_PORT: "50052"
      AFD_CLUSTER_JOIN_PEERS: node-1:50052

  node-3:
    <<: *node-common
    container_name: afd-3
    hostname: node-3
    depends_on:
      - node-1
    ports:
      - "8082:8080"
      - "50071:50051"
      - "50072:50052/udp"
    environment:
      <<: *node-env
      AFD_NODE_ID: node-3
      AFD_API_PORT: "8080"
      AFD_CLUSTER_GRPC_PORT: "50051"
      AFD_CLUSTER_DISCOVERY_PORT: "50052"
      AFD_CLUSTER_JOIN_PEERS: node-1:50052

volumes:
  nexus-data:
    driver: local
