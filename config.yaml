# NexusDL 配置文件
node:
  id: "nexus-node-1"
  name: "nexus-node"
  log_level: "info"
  data_dir: "./data"

api:
  host: "0.0.0.0"
  port: 8080
  auth_token: ""
  rate_limit: 100
  enable_cors: true

cluster:
  grpc_port: 50051
  discovery_port: 50052
  join_peers: []
  node_timeout: "30s"

download:
  max_connections: 8
  min_chunk_size: 1048576
  max_chunk_size: 52428800
  default_chunk_size: 10485760
  buffer_size: 32768
  timeout: "30s"
  retry_count: 3
  speed_limit: 0
  proxy:
    type: ""
    host: ""
    port: 0
    username: ""
    password: ""
  bt:
    enabled: true
    download_speed_limit: 0
    upload_speed_limit: 0
    port: 6881
    data_dir: "./bt-data"
    torrent_files_dir: "./torrents"
    max_connections: 100
    max_peers: 100
    seed_ratio: 1.0
    seed_time: "24h"
    tracker_list: []
    dht_enabled: true
    dht_nodes:
      - "router.bittorrent.com:6881"
      - "dht.transmissionbt.com:6881"
      - "router.utorrent.com:6881"
    disable_tcp: false
    disable_utp: false
    piece_length: 0
    sequential_download: false
    first_piece_priority: false
  post_process:
    extract:
      enabled: false
      output_dir: ""
      delete_after_extract: false
    move:
      enabled: false
      destination: ""
      overwrite: false
      delete_source: false
    cleanup:
      enabled: false
      delete_source_file: false
      delete_temp_files: true
      patterns:
        - "*.tmp"
        - "*.temp"
        - "*.part"
