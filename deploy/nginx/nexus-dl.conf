# NexusDL reverse proxy (nginx)
#
# - Terminates TLS
# - Rate limits unauthenticated traffic
# - Proxies /api/* to the node on :8080
# - Streams WebSocket upgrades to /ws
# - Restricts /metrics and /ready to internal monitoring network
#
# Usage:
#   sudo cp deploy/nginx/nexus-dl.conf /etc/nginx/sites-available/nexus-dl.conf
#   sudo ln -s /etc/nginx/sites-available/nexus-dl.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream nexus_dl_api {
    server 127.0.0.1:8080;
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate limit zone shared by the API locations
limit_req_zone $binary_remote_addr zone=nexus_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=nexus_rpc:10m rate=5r/s;

# Connection limit per IP
limit_conn_zone $binary_remote_addr zone=nexus_conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name downloads.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name downloads.example.com;

    # TLS
    ssl_certificate     /etc/letsencrypt/live/downloads.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/downloads.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hard request body cap
    client_max_body_size 12m;

    # Per-IP concurrency cap
    limit_conn nexus_conn 50;

    # Health probes — bypass everything
    location = /health { proxy_pass http://nexus_dl_api; access_log off; }
    location = /ready  { proxy_pass http://nexus_dl_api; access_log off; }

    # Metrics — only Prometheus may scrape. Replace 10.0.0.0/24 with your range.
    location = /metrics {
        allow 10.0.0.0/24;
        deny  all;
        proxy_pass http://nexus_dl_api;
    }

    # Web UI
    location / {
        limit_conn nexus_conn 20;
        proxy_pass http://nexus_dl_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket — explicit Upgrade / Connection handling
    location = /ws {
        proxy_pass http://nexus_dl_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    # REST API
    location /api/ {
        limit_req zone=nexus_api burst=40 nodelay;
        proxy_pass http://nexus_dl_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Aria2-compatible RPC — stricter rate limit
    location ~ ^/(jsonrpc|xmlrpc|rpc)$ {
        limit_req zone=nexus_rpc burst=10 nodelay;
        proxy_pass http://nexus_dl_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }
}
