# Prometheus scrape config snippet for AFD.
#
# Add to your prometheus.yml under `scrape_configs:`:
#
#   scrape_configs:
#     - job_name: afd
#       metrics_path: /metrics
#       scheme: http
#       static_configs:
#         - targets: ['node-1.lan:8080', 'node-2.lan:8080', 'node-3.lan:8080']
#           labels: {cluster: 'home'}
#
# And the alert rules:
#
#   rule_files:
#     - /etc/prometheus/rules/afd.yml

scrape_configs:
  - job_name: afd
    metrics_path: /metrics
    scheme: http
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - node-1.lan:8080
          - node-2.lan:8080
          - node-3.lan:8080
        labels:
          cluster: home

rule_files:
  - /etc/prometheus/rules/afd.yml
