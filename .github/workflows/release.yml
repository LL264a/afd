name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: '1.24'

jobs:
  build:
    name: Build binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: linux
            goarch: "386"
            ext: ''
          - goos: linux
            goarch: arm
            ext: ''
          - goos: linux
            goarch: mips
            ext: ''
          - goos: linux
            goarch: mipsle
            ext: ''
          - goos: linux
            goarch: s390x
            ext: ''
          - goos: linux
            goarch: riscv64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: windows
            goarch: "386"
            ext: .exe
          - goos: freebsd
            goarch: amd64
            ext: ''
          - goos: netbsd
            goarch: amd64
            ext: ''
    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: |
          OUTPUT_NAME="afd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath \
            -ldflags="-s -w -X main.Version=${GITHUB_REF_NAME:-dev} -X main.Commit=${GITHUB_SHA::12}" \
            -o "${OUTPUT_NAME}" \
            ./cmd/afd

      - name: Checksum
        run: sha256sum afd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} > afd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: afd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            afd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            afd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v0.1.0-beta-$(date +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: artifacts/afd-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
