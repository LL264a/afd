name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: linux
            goarch: "386"
            ext: ''
          - goos: linux
            goarch: arm
            ext: ''
          - goos: linux
            goarch: mips
            ext: ''
          - goos: linux
            goarch: mipsle
            ext: ''
          - goos: linux
            goarch: s390x
            ext: ''
          - goos: linux
            goarch: riscv64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: windows
            goarch: "386"
            ext: .exe
          - goos: freebsd
            goarch: amd64
            ext: ''
          - goos: freebsd
            goarch: arm64
            ext: ''
          - goos: openbsd
            goarch: amd64
            ext: ''
          - goos: netbsd
            goarch: amd64
            ext: ''
          - goos: solaris
            goarch: amd64
            ext: ''
          - goos: aix
            goarch: ppc64
            ext: ''
          - goos: illumos
            goarch: amd64
            ext: ''
          - goos: js
            goarch: wasm
            ext: .wasm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_NAME="afd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "${OUTPUT_NAME}" ./cmd/afd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: afd-${{ matrix.goos }}-${{ matrix.goarch }}
          path: afd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
