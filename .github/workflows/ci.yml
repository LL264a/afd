name: CI

on:
  push:
    branches: [main, release/**]
  pull_request:
    branches: [main, release/**]

permissions:
  contents: read

env:
  GO_VERSION: '1.24'

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::Files need gofmt:"
            gofmt -l .
            exit 1
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests
        run: |
          set -o pipefail
          go test ./... -count=1 -timeout 120s -v 2>&1 | tee /tmp/test-output.txt
      - name: Report failures
        if: failure()
        run: |
          grep -E "^(--- FAIL|FAIL\s|panic:|--- SKIP)" /tmp/test-output.txt | head -30 | while IFS= read -r line; do
            echo "::error::$line"
          done
          echo "=== Last 50 lines of test output ==="
          tail -50 /tmp/test-output.txt

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run integration tests
        run: go test -tags=integration ./test/integration/... -count=1 -timeout 120s -v

  build:
    name: Build (Linux)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" ./cmd/afd
          file afd
          ls -lh afd
      - name: Verify binary runs
        run: ./afd --version

  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: "386"
          - goos: linux
            goarch: arm
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    env:
      CGO_ENABLED: '0'
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cross compile
        run: go build -trimpath -ldflags="-s -w" ./cmd/afd

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t afd-ci .
      - name: Verify container starts
        run: |
          docker run -d --name afd-test -p 18080:8080 afd-ci
          # Wait for server to be ready (up to 30s)
          ready=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18080/health >/dev/null 2>&1; then
              ready=true
              break
            fi
            if ! docker ps --filter name=afd-test --filter status=running | grep -q afd-test; then
              echo "Container exited early"
              break
            fi
            sleep 1
          done
          if [ "$ready" = "false" ]; then
            echo "=== Health check failed after 30s ==="
            docker logs afd-test 2>&1 || true
            # Surface key log lines as annotations for diagnostics
            docker logs afd-test 2>&1 | grep -iE "error|panic|fatal|fail|invalid" | head -10 | while IFS= read -r line; do
              echo "::error::$line"
            done
            docker stop afd-test 2>/dev/null || true
            docker rm afd-test 2>/dev/null || true
            exit 1
          fi
          echo "Health check passed"
          # JSON-RPC getVersion
          curl -sf -X POST http://localhost:18080/jsonrpc \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"aria2.getVersion","params":[],"id":1}' \
            | grep -o '"version":"[^"]*"' || { echo "RPC check failed"; docker logs afd-test; exit 1; }
          echo "RPC check passed"
          docker stop afd-test
          docker rm afd-test

  smoke:
    name: Smoke Test (Serve + API)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        run: go build -trimpath -ldflags="-s -w" -o afd ./cmd/afd
      - name: Start serve mode
        run: |
          mkdir -p /tmp/afd-data
          # Redirect to file (not tee) so $! is the afd PID, not tee's
          AFD_NODE_DATA_DIR=/tmp/afd-data ./afd serve -c config.yaml > /tmp/afd-serve.log 2>&1 &
          AFD_PID=$!
          echo "AFD_PID=$AFD_PID" >> $GITHUB_ENV
          # Wait for server to be ready (up to 20s)
          ready=false
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              ready=true
              echo "Server is ready (after ${i}s)"
              break
            fi
            if ! kill -0 $AFD_PID 2>/dev/null; then
              echo "Server process exited unexpectedly after ${i}s"
              echo "=== Serve log ==="
              cat /tmp/afd-serve.log
              # Surface key log lines as annotations for diagnostics
              grep -iE "error|panic|fatal|fail|invalid" /tmp/afd-serve.log 2>/dev/null | head -10 | while IFS= read -r line; do
                echo "::error::$line"
              done
              exit 1
            fi
            sleep 1
          done
          if [ "$ready" = "false" ]; then
            echo "Server not responding after 20s"
            echo "=== Serve log ==="
            cat /tmp/afd-serve.log
            grep -iE "error|panic|fatal|fail|invalid" /tmp/afd-serve.log 2>/dev/null | head -10 | while IFS= read -r line; do
              echo "::error::$line"
            done
            exit 1
          fi
      - name: Test health endpoint
        run: |
          resp=$(curl -sf http://localhost:8080/health)
          echo "Health: $resp"
      - name: Test metrics endpoint
        run: |
          resp=$(curl -sf http://localhost:8080/metrics | head -5)
          echo "Metrics (first 5 lines): $resp"
      - name: Test JSON-RPC getVersion
        run: |
          resp=$(curl -sf -X POST http://localhost:8080/jsonrpc \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"aria2.getVersion","params":[],"id":1}')
          echo "getVersion: $resp"
          echo "$resp" | jq -e '.result.version' || { echo "No version in response"; exit 1; }
      - name: Test JSON-RPC getGlobalStat
        run: |
          resp=$(curl -sf -X POST http://localhost:8080/jsonrpc \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"aria2.getGlobalStat","params":[],"id":2}')
          echo "getGlobalStat: $resp"
      - name: Test JSON-RPC listMethods
        run: |
          resp=$(curl -sf -X POST http://localhost:8080/jsonrpc \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"system.listMethods","params":[],"id":3}')
          echo "listMethods: $resp"
          echo "$resp" | jq -e '.result | length > 20' || { echo "Too few methods"; exit 1; }
      - name: Test task creation via API
        run: |
          resp=$(curl -sf -X POST http://localhost:8080/api/tasks \
            -H "Content-Type: application/json" \
            -d '{"url":"https://example.com/test.bin"}')
          echo "Create task: $resp"
      - name: Test task list via API
        run: |
          resp=$(curl -sf http://localhost:8080/api/tasks)
          echo "List tasks: $resp"
      - name: Stop server
        if: always()
        run: |
          if [ -n "$AFD_PID" ]; then
            kill $AFD_PID || true
            wait $AFD_PID 2>/dev/null || true
          fi
          echo "=== Serve log ==="
          cat /tmp/afd-serve.log 2>/dev/null || echo "No log file"
